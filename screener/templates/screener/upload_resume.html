{% extends 'screener/base.html' %}

{% block content %}
<h1>Upload Resume</h1>
<h2>Position: {{ job.title }}</h2>

<form method="post" enctype="multipart/form-data">
    {% csrf_token %}

    <label>Resume (PDF or DOCX)</label>
    <input type="file" name="resume" accept=".pdf,.docx" required multiple>

    <button type="submit" class="btn">Screen Candidate</button>
</form>

<br>
<a href="/job/{{ job.id }}/">← Back to candidates</a>
{% endblock %}

<!DOCTYPE html>
<html>
    <head>
        <title>Resume Screener</title>
        <style>
            body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px}
            nav { margin-bottom: 30px; }
            nav a { margin-right: 15px; text-decoration: none; color: #073763; font-weight: bold; }
            .btn { background: #073763; color: white; padding: 8px 16px; border: none; cursor: pointer; text-decoration: none; display: inline-block; }
            .btn-green { background: #2e7d32; }
            .card { border: 1px solid #ddd; padding: 20px; margin-bottom: 15px; border-radius: 4px; }
            .score { font-size: 24px; font-weight: bold; color: #073763; }
            .messages { background: #e8f5e9; padding: 10px; margin-bottom: 20px; border-left: 4px solid #2e7d32; }
            input, textarea { width: 100%; padding: 8px; margin-bottom: 15px; box-sizing: border-box; border: 1px solid #ddd; }
            label { display: block; margin-bottom: 5px; font-weight: bold; }
        </style>
    </head>
    <body>
        <nav>
            <a href="/">All Jobs</a>
            <a href="/job/create/">+ New Job</a>
        </nav>
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </body>
</html>
